<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ConGlobal Employment Portal</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: url('/bg.webp.webp') no-repeat center center fixed; /* Fixed image reference */
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 400px;
            background: rgba(0, 0, 0, 0.85); /* Sleek dark card */
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .logo {
            display: block;
            margin: 0 auto 15px auto;
            width: 150px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #ffffff;
            font-size: 22px;
        }

        input[type="text"], input[type="email"], select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        /* Custom File Upload Button */
        input[type="file"] {
            display: none;
        }

        .file-upload-btn {
            display: block;
            width: 100%;
            background: #10B981; /* Bright green like your screenshot */
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .file-upload-btn:hover {
            background: #059669;
        }

        .file-info {
            text-align: center;
            font-size: 12px;
            color: #bbbbbb;
            margin-bottom: 15px;
            display: block;
            margin-top: 5px;
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #10B981; /* Green submit button */
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button[type="submit"]:hover {
            background: #059669;
        }

    </style>
</head>
<body>

<div class="container">
    <!-- Logo -->
    <img src="/logo.png.png" alt="Company Logo" class="logo">

    <h2>Apply for a Position</h2>

    <form name="employment-application" data-netlify="true" data-netlify-recaptcha="true" action="/thankyou.html" method="POST" enctype="multipart/form-data">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="text" name="phone" placeholder="(123) 456-7890" required>

        <select name="position" required>
            <option value="">Select Position</option>
            <option>Equipment Operator</option>
            <option>Warehouse Worker</option>
            <option>Truck Driver</option>
            <option>Logistics Coordinator</option>
        </select>

        <!-- Custom Upload Button -->
        <label for="resume-upload" class="file-upload-btn" id="upload-label">+ Add Application (Resume)</label>
        <input id="resume-upload" type="file" name="resume" accept=".pdf,.doc,.docx" required onchange="document.getElementById('upload-label').innerText = '✅ File Added: ' + this.files[0].name;">
        <span class="file-info">Accepted formats: PDF, DOC, DOCX</span>

        <!-- Netlify reCAPTCHA -->
        <div data-netlify-recaptcha="true" style="margin-bottom: 12px; display: flex; justify-content: center;"></div>

        <button type="submit">Submit Application</button>
    </form>
</div>

</body>
</html>
